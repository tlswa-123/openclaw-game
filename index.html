<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>回家路 - The Way Home</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;max-width:100vw;max-height:100vh;cursor:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const W=480,H=320,SCALE=2;
const canvas=document.getElementById('c');
canvas.width=W;canvas.height=H;
canvas.style.width=W*SCALE+'px';canvas.style.height=H*SCALE+'px';
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;

// Audio
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function playTone(freq,dur,type='square',vol=0.08){
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=vol;
  o.connect(g);g.connect(audioCtx.destination);
  o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.stop(audioCtx.currentTime+dur);
}
function sfxStep(){playTone(80+Math.random()*40,0.06,'square',0.04)}
function sfxCorrect(){playTone(440,0.1);setTimeout(()=>playTone(660,0.15),100)}
function sfxWrong(){playTone(200,0.3,'sawtooth',0.1);setTimeout(()=>playTone(150,0.4,'sawtooth',0.08),200)}
function sfxWin(){[0,100,200,300,400].forEach((d,i)=>setTimeout(()=>playTone([523,659,784,1047,1319][i],0.3,'square',0.06),d))}

// Ambient drone
let ambientOn=false;
function startAmbient(){
  if(ambientOn)return;ambientOn=true;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';o.frequency.value=55;g.gain.value=0.015;
  o.connect(g);g.connect(audioCtx.destination);o.start();
  const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
  o2.type='sine';o2.frequency.value=82.5;g2.gain.value=0.01;
  o2.connect(g2);g2.connect(audioCtx.destination);o2.start();
}

// Game state
let state='title'; // title, playing, decision, gameover, win
let corridor=1, playerX=40, walkFrame=0, walkTimer=0;
let hasAnomaly=false, activeAnomaly=-1;
let fadeAlpha=0, fadeDir=0, nextState='', msgTimer=0, msgText='';
let stepTimer=0;

// Colors
const C={
  ceil:'#3a4a3a',floor:'#5a5a50',wall:'#6a7a6a',wallDark:'#505a50',
  light:'#eeeea0',lightOff:'#4a4a40',door:'#8a6a4a',doorAlt:'#4a6a8a',
  window:'#7a9aaa',windowFrame:'#4a5a4a',poster:'#aa8866',
  locker:'#5a6a7a',trash:'#4a4a4a',tile1:'#5a5a50',tile2:'#525248',
  skin:'#f0c8a0',hair:'#2a1a10',uniform:'#3a4a6a',skirt:'#2a3a5a',
  sock:'#e0e0e0',shoe:'#1a1a1a'
};

// Anomaly types
const ANOMALY_TYPES=[
  'missing_light',    // one fluorescent light is off
  'extra_window',     // extra window added
  'wall_crack',       // crack in the wall
  'door_color',       // door is blue instead of brown
  'clock_wrong',      // clock hands at wrong angle
  'extra_poster',     // extra poster on wall
  'missing_trash',    // trash can is gone
  'locker_open',      // one locker is slightly open
  'ceiling_stain',    // dark stain on ceiling
  'floor_crack',      // crack in floor tiles
];

function resetCorridor(){
  playerX=40;walkFrame=0;
  if(corridor===1){hasAnomaly=false;activeAnomaly=-1;}
  else{
    hasAnomaly=Math.random()<0.6;
    activeAnomaly=hasAnomaly?ANOMALY_TYPES[Math.floor(Math.random()*ANOMALY_TYPES.length)]:-1;
  }
}

function startGame(){
  corridor=1;state='playing';
  resetCorridor();startAmbient();
  audioCtx.resume();
}

// Drawing functions
function drawRect(x,y,w,h,color){ctx.fillStyle=color;ctx.fillRect(Math.floor(x),Math.floor(y),w,h);}

function drawCorridor(){
  // Background wall
  drawRect(0,0,W,H,C.ceil);
  // Ceiling
  drawRect(0,0,W,80,C.ceil);
  // Wall
  drawRect(0,80,W,140,C.wall);
  // Wall trim line
  drawRect(0,78,W,2,'#4a5a4a');
  drawRect(0,218,W,2,'#4a5a4a');
  // Floor
  for(let x=0;x<W;x+=24){
    for(let y=220;y<H;y+=16){
      drawRect(x,y,12,16,C.tile1);
      drawRect(x+12,y,12,16,C.tile2);
    }
  }
  // Floor anomaly
  if(activeAnomaly==='floor_crack'){
    ctx.fillStyle='#2a2a20';
    ctx.fillRect(200,230,2,20);ctx.fillRect(202,235,8,2);ctx.fillRect(210,232,2,12);
  }

  // Fluorescent lights on ceiling
  const lights=[60,160,260,360];
  lights.forEach((lx,i)=>{
    const isOff=(activeAnomaly==='missing_light'&&i===2);
    drawRect(lx,20,40,6,isOff?C.lightOff:C.light);
    drawRect(lx-2,18,2,10,'#3a3a3a');
    drawRect(lx+40,18,2,10,'#3a3a3a');
    if(!isOff){
      ctx.fillStyle='rgba(238,238,160,0.03)';
      ctx.fillRect(lx-10,26,60,60);
    }
  });

  // Ceiling stain anomaly
  if(activeAnomaly==='ceiling_stain'){
    ctx.fillStyle='#2a3a2a';
    ctx.fillRect(300,40,20,12);ctx.fillRect(305,36,10,20);ctx.fillRect(310,44,14,6);
  }

  // Windows
  const winPositions=[80,240];
  if(activeAnomaly==='extra_window')winPositions.push(380);
  winPositions.forEach(wx=>{
    drawRect(wx,100,50,60,C.window);
    drawRect(wx,100,50,2,C.windowFrame);
    drawRect(wx,158,50,2,C.windowFrame);
    drawRect(wx,100,2,60,C.windowFrame);
    drawRect(wx+48,100,2,60,C.windowFrame);
    drawRect(wx+24,100,2,60,C.windowFrame);
    drawRect(wx,128,50,2,C.windowFrame);
    // Sky through window
    drawRect(wx+2,102,22,26,'#8aaabb');
    drawRect(wx+26,102,22,26,'#8aaabb');
    drawRect(wx+2,130,22,28,'#8aaabb');
    drawRect(wx+26,130,22,28,'#8aaabb');
  });

  // Door
  const doorX=180;
  const doorColor=(activeAnomaly==='door_color')?C.doorAlt:C.door;
  drawRect(doorX,110,36,108,doorColor);
  drawRect(doorX,110,36,2,'#3a3a3a');
  drawRect(doorX,110,2,108,'#3a3a3a');
  drawRect(doorX+34,110,2,108,'#3a3a3a');
  drawRect(doorX+28,158,4,4,'#daa520'); // doorknob
  // Door frame
  drawRect(doorX-2,108,2,112,'#4a5a4a');
  drawRect(doorX+36,108,2,112,'#4a5a4a');
  drawRect(doorX-2,108,40,2,'#4a5a4a');

  // Lockers
  const lockerX=330;
  for(let i=0;i<3;i++){
    const lx=lockerX+i*18;
    drawRect(lx,110,16,108,C.locker);
    drawRect(lx,110,16,2,'#4a5a6a');
    drawRect(lx,110,1,108,'#4a5a6a');
    drawRect(lx+15,110,1,108,'#4a5a6a');
    drawRect(lx+7,150,2,4,'#aaa');
    // Locker open anomaly
    if(activeAnomaly==='locker_open'&&i===1){
      drawRect(lx+14,110,6,108,'#5a6a7a');
      drawRect(lx+14,110,6,2,'#4a5a6a');
      drawRect(lx+19,110,1,108,'#3a4a5a');
    }
  }

  // Poster
  drawRect(140,120,20,26,C.poster);
  drawRect(140,120,20,2,'#6a5a4a');
  // Simple drawing on poster
  drawRect(144,126,4,4,'#cc4444');
  drawRect(150,128,6,8,'#4444cc');

  // Extra poster anomaly
  if(activeAnomaly==='extra_poster'){
    drawRect(290,120,20,26,'#aa6688');
    drawRect(290,120,20,2,'#6a4a5a');
    drawRect(294,126,12,6,'#44aa44');
    drawRect(296,134,8,8,'#aaaa44');
  }

  // Wall crack anomaly
  if(activeAnomaly==='wall_crack'){
    ctx.fillStyle='#3a4a3a';
    ctx.fillRect(270,100,2,30);ctx.fillRect(272,110,6,2);
    ctx.fillRect(278,108,2,16);ctx.fillRect(268,120,2,14);
  }

  // Clock on wall
  const clockX=400,clockY=100;
  drawRect(clockX,clockY,16,16,'#eee');
  drawRect(clockX,clockY,16,1,'#333');
  drawRect(clockX,clockY+15,16,1,'#333');
  drawRect(clockX,clockY,1,16,'#333');
  drawRect(clockX+15,clockY,1,16,'#333');
  // Clock hands
  drawRect(clockX+7,clockY+4,2,5,'#111'); // hour hand (12 o'clock-ish)
  if(activeAnomaly==='clock_wrong'){
    drawRect(clockX+8,clockY+7,6,2,'#111'); // minute pointing right (wrong)
  }else{
    drawRect(clockX+7,clockY+3,2,6,'#111'); // minute also ~12
  }
  drawRect(clockX+7,clockY+7,2,2,'#c00'); // center dot

  // Trash can
  if(activeAnomaly!=='missing_trash'){
    const tx=420;
    drawRect(tx,196,16,22,C.trash);
    drawRect(tx-1,194,18,4,'#5a5a5a');
    drawRect(tx+2,198,4,2,'#3a3a3a');
    drawRect(tx+8,198,4,2,'#3a3a3a');
  }

  // Baseboard
  drawRect(0,216,W,4,'#4a4a3a');
}

function drawPlayer(x){
  const frame=walkFrame;
  const px=Math.floor(x),py=180;
  // Legs animation
  const legOff=frame===0?0:(frame===1?2:-2);
  // Hair
  drawRect(px+2,py,12,4,C.hair);
  drawRect(px+1,py+2,14,6,C.hair);
  drawRect(px+10,py+4,6,8,C.hair); // long hair back
  drawRect(px+12,py+8,4,10,C.hair);
  // Head/face
  drawRect(px+3,py+4,8,8,C.skin);
  drawRect(px+4,py+7,2,2,'#1a1a1a'); // eye
  // Body/uniform
  drawRect(px+3,py+12,10,10,C.uniform);
  drawRect(px+2,py+14,3,8,C.uniform); // arm
  drawRect(px+11,py+14,3,8,C.uniform); // arm
  // Skirt
  drawRect(px+2,py+22,12,6,C.skirt);
  // Legs
  drawRect(px+4,py+28,3,6,C.sock);
  drawRect(px+9,py+28,3,6,C.sock);
  drawRect(px+4+legOff,py+34,3,4,C.shoe);
  drawRect(px+9-legOff,py+34,3,4,C.shoe);
}

function drawText(text,x,y,color='#fff',size=8){
  ctx.fillStyle=color;
  ctx.font=size+'px monospace';
  ctx.fillText(text,x,y);
}

function drawTextCenter(text,y,color='#fff',size=10){
  ctx.font=size+'px monospace';
  const m=ctx.measureText(text);
  ctx.fillStyle=color;
  ctx.fillText(text,(W-m.width)/2,y);
}

// Input
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(state==='title'){startGame();return;}
  if(state==='gameover'||state==='win'){startGame();return;}
  if(state==='decision'){
    if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){
      decide('forward');
    }else if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'||e.key==='ArrowUp'||e.key==='w'||e.key==='W'){
      decide('back');
    }
  }
});
document.addEventListener('keyup',e=>keys[e.key]=false);

// Touch
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  audioCtx.resume();
  if(state==='title'){startGame();return;}
  if(state==='gameover'||state==='win'){startGame();return;}
  const rect=canvas.getBoundingClientRect();
  const tx=e.touches[0].clientX-rect.left;
  if(state==='decision'){
    if(tx<rect.width/2)decide('back');
    else decide('forward');
  }
},{passive:false});

function decide(choice){
  if(choice==='back'){
    if(hasAnomaly){correct();}else{wrong();}
  }else{
    if(!hasAnomaly){correct();}else{wrong();}
  }
}

function correct(){
  sfxCorrect();
  corridor++;
  if(corridor>10){state='win';sfxWin();return;}
  msgText='正确！进入走廊 '+corridor;msgTimer=60;
  state='playing';resetCorridor();
}
function wrong(){
  sfxWrong();
  state='gameover';msgTimer=120;
  if(hasAnomaly)msgText='你没有发现异常...';
  else msgText='这里没有异常，不需要回头！';
}

// Game loop
let lastTime=0;
function loop(time){
  const dt=Math.min(time-lastTime,33);lastTime=time;

  ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);

  if(state==='title'){
    drawRect(0,0,W,H,'#1a2a1a');
    drawTextCenter('回 家 路',120,'#aaccaa',20);
    drawTextCenter('The Way Home',148,'#6a8a6a',10);
    drawTextCenter('穿过10条走廊，安全回家',180,'#8a8a7a',9);
    drawTextCenter('发现异常 → 回头 (←)',200,'#7a7a6a',8);
    drawTextCenter('一切正常 → 前进 (→)',214,'#7a7a6a',8);
    drawTextCenter('按任意键开始',260,'#aaaaaa',10);
    // Draw a small player preview
    drawPlayer(230);
  }
  else if(state==='playing'){
    drawCorridor();
    drawPlayer(playerX);

    // Auto-walk
    stepTimer+=dt;
    if(stepTimer>180){stepTimer=0;sfxStep();}
    walkTimer+=dt;
    if(walkTimer>150){walkTimer=0;walkFrame=(walkFrame+1)%3;}
    playerX+=dt*0.06;

    // UI
    drawRect(0,0,100,16,'rgba(0,0,0,0.6)');
    drawText('走廊 '+corridor+'/10',4,12,'#ddd',10);

    drawRect(0,H-16,W,16,'rgba(0,0,0,0.5)');
    drawText('→ 继续前进  |  ← 回头离开',100,H-4,'#aaa',9);

    // Reached end
    if(playerX>=W-50){
      playerX=W-50;
      state='decision';
    }

    // Message overlay
    if(msgTimer>0){
      msgTimer--;
      drawRect(W/2-100,H/2-14,200,28,'rgba(0,0,0,0.7)');
      drawTextCenter(msgText,H/2+4,'#aaddaa',10);
    }
  }
  else if(state==='decision'){
    drawCorridor();
    drawPlayer(playerX);

    drawRect(0,0,100,16,'rgba(0,0,0,0.6)');
    drawText('走廊 '+corridor+'/10',4,12,'#ddd',10);

    // Decision prompt
    drawRect(W/2-140,H/2-20,280,40,'rgba(0,0,0,0.8)');
    drawRect(W/2-140,H/2-20,280,2,'#aaa');
    drawRect(W/2-140,H/2+18,280,2,'#aaa');
    drawTextCenter('继续前进？(→)    还是回头？(←)',H/2+4,'#eee',10);
  }
  else if(state==='gameover'){
    drawCorridor();
    drawPlayer(playerX);
    drawRect(0,0,W,H,'rgba(20,0,0,0.7)');
    drawTextCenter('异常未被发现！',130,'#ff6666',16);
    drawTextCenter(msgText,160,'#cc8888',10);
    drawTextCenter('回到起点...',190,'#aa6666',10);
    drawTextCenter('按任意键重新开始',240,'#888',9);
  }
  else if(state==='win'){
    drawRect(0,0,W,H,'#1a2a1a');
    drawTextCenter('🏠',100,'#fff',30);
    drawTextCenter('你安全到家了！',150,'#aaffaa',18);
    drawTextCenter('恭喜通关！',180,'#88cc88',12);
    drawTextCenter('按任意键重新开始',240,'#888',9);
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
