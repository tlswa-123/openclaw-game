<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>回家路</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- Constants ---
const GAME_H = 360;
const PLAYER_SPEED = 3;
const TOTAL_CORRIDORS = 10;
const ANOMALY_CHANCE = 0.6;

// --- State ---
let gameState = 'loading'; // loading, start, playing, fadein, gameover, win
let currentCorridor = 1;
let isAnomaly = false;
let currentMapImg = null;
let playerX = 0;
let playerFacing = 1; // 1=right, -1=left
let playerFrame = 0;
let frameTimer = 0;
let isMoving = false;
let fadeAlpha = 0;
let fadeDir = 0; // 1=fading out, -1=fading in
let nextAction = null;
let gameW = 0;
let mapW = 0;
let keys = {};
let touchSide = 0; // -1 left, 1 right, 0 none
let messageText = '';
let messageTimer = 0;
let ambientNode = null;
let ambientGain = null;
let audioCtx = null;

// --- Images ---
const imgNames = [
  'corridor_normal_00002_.png',
  'corridor_anomaly1_00001_.png','corridor_anomaly2_00001_.png','corridor_anomaly3_00001_.png',
  'corridor_anomaly4_00001_.png','corridor_anomaly5_00001_.png','corridor_anomaly6_00001_.png',
  'corridor_anomaly7_00001_.png','corridor_anomaly8_00001_.png','corridor_anomaly9_00001_.png',
  'corridor_anomaly10_00001_.png'
];
const images = {};
let loadedCount = 0;

function preload() {
  imgNames.forEach(name => {
    const img = new Image();
    img.onload = () => { loadedCount++; if (loadedCount === imgNames.length) { gameState = 'start'; } };
    img.onerror = () => { loadedCount++; if (loadedCount === imgNames.length) { gameState = 'start'; } };
    img.src = 'maps/' + name;
    images[name] = img;
  });
}

// --- Audio ---
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  startAmbient();
}

function startAmbient() {
  if (!audioCtx || ambientNode) return;
  // Eerie drone using oscillators
  ambientGain = audioCtx.createGain();
  ambientGain.gain.value = 0.06;
  ambientGain.connect(audioCtx.destination);
  const osc1 = audioCtx.createOscillator();
  osc1.type = 'sine'; osc1.frequency.value = 55;
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine'; osc2.frequency.value = 57.5;
  const osc3 = audioCtx.createOscillator();
  osc3.type = 'sawtooth'; osc3.frequency.value = 110;
  const g3 = audioCtx.createGain(); g3.gain.value = 0.015; osc3.connect(g3); g3.connect(ambientGain);
  osc1.connect(ambientGain); osc2.connect(ambientGain);
  osc1.start(); osc2.start(); osc3.start();
  ambientNode = { osc1, osc2, osc3 };
}

let lastFootstep = 0;
function playFootstep() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  if (now - lastFootstep < 0.28) return;
  lastFootstep = now;
  const buf = audioCtx.createBufferSource();
  const buffer = audioCtx.createBuffer(1, 1200, audioCtx.sampleRate);
  const d = buffer.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    d[i] = (Math.random() * 2 - 1) * Math.exp(-i / 300) * 0.3;
  }
  buf.buffer = buffer;
  const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 800;
  buf.connect(f); f.connect(audioCtx.destination);
  buf.start();
}

function playSfx(correct) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  if (correct) {
    osc.type = 'square'; osc.frequency.value = 520; g.gain.value = 0.12;
    osc.frequency.setValueAtTime(520, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(780, audioCtx.currentTime + 0.15);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  } else {
    osc.type = 'sawtooth'; osc.frequency.value = 200; g.gain.value = 0.15;
    osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.4);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
  }
}

// --- Corridor Setup ---
function setupCorridor(corridorNum) {
  if (corridorNum === 1) {
    isAnomaly = false;
    currentMapImg = images['corridor_normal_00002_.png'];
  } else {
    isAnomaly = Math.random() < ANOMALY_CHANCE;
    if (isAnomaly) {
      const idx = Math.floor(Math.random() * 10) + 1;
      currentMapImg = images['corridor_anomaly' + idx + '_00001_.png'];
    } else {
      currentMapImg = images['corridor_normal_00002_.png'];
    }
  }
  mapW = currentMapImg.naturalWidth;
  // Player starts at center of map
  playerX = mapW / 2;
  playerFacing = 1;
  playerFrame = 0;
  isMoving = false;
}

function startFade(callback) {
  fadeAlpha = 0; fadeDir = 1; nextAction = callback;
}

// --- Player Drawing (pixel art schoolgirl ~64px tall) ---
function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

function drawPlayer(sx, sy, facing, frame) {
  // ~64px tall schoolgirl: hair, face, uniform, skirt, legs
  const f = facing;
  const x = Math.round(sx);
  const y = Math.round(sy);
  // Walking bob
  const bob = isMoving ? [0, -2, 0][frame % 3] : 0;
  const legOff = isMoving ? [0, 3, 0][frame % 3] : 0;
  const legOff2 = isMoving ? [3, 0, 3][frame % 3] : 0;

  // Shadow
  drawPixelRect(x - 10, y + 64, 20, 3, 'rgba(0,0,0,0.2)');

  // Hair (dark brown/black) - back layer
  drawPixelRect(x - 12, y + bob - 2, 24, 22, '#1a1a2e');
  // Long hair sides
  drawPixelRect(x - 13, y + bob + 10, 6, 20, '#1a1a2e');
  drawPixelRect(x + 7, y + bob + 10, 6, 20, '#1a1a2e');

  // Face (skin)
  drawPixelRect(x - 8, y + bob + 6, 16, 14, '#f5d0a9');
  // Eyes
  if (f === 1) {
    drawPixelRect(x + 1, y + bob + 11, 4, 4, '#1a1a2e');
    drawPixelRect(x + 2, y + bob + 12, 2, 2, '#fff');
    drawPixelRect(x - 5, y + bob + 11, 4, 4, '#1a1a2e');
    drawPixelRect(x - 4, y + bob + 12, 2, 2, '#fff');
  } else {
    drawPixelRect(x - 5, y + bob + 11, 4, 4, '#1a1a2e');
    drawPixelRect(x - 4, y + bob + 12, 2, 2, '#fff');
    drawPixelRect(x + 1, y + bob + 11, 4, 4, '#1a1a2e');
    drawPixelRect(x, y + bob + 12, 2, 2, '#fff');
  }
  // Mouth
  drawPixelRect(x - 2, y + bob + 17, 4, 1, '#c97060');

  // Hair bangs (front)
  drawPixelRect(x - 10, y + bob - 2, 20, 8, '#1a1a2e');
  drawPixelRect(x - 12, y + bob + 2, 4, 6, '#1a1a2e');
  drawPixelRect(x + 8, y + bob + 2, 4, 6, '#1a1a2e');

  // Neck
  drawPixelRect(x - 3, y + bob + 20, 6, 3, '#f5d0a9');

  // Uniform top (white shirt with sailor collar)
  drawPixelRect(x - 12, y + bob + 22, 24, 16, '#e8e8f0');
  // Collar (navy)
  drawPixelRect(x - 12, y + bob + 22, 24, 5, '#2d3a6e');
  drawPixelRect(x - 6, y + bob + 22, 12, 8, '#e8e8f0');
  // Ribbon (red)
  drawPixelRect(x - 2, y + bob + 24, 4, 6, '#cc3333');

  // Arms
  const armY = y + bob + 26;
  drawPixelRect(x - 15, armY + legOff, 4, 14, '#e8e8f0');
  drawPixelRect(x + 11, armY + legOff2, 4, 14, '#e8e8f0');
  // Hands
  drawPixelRect(x - 15, armY + 14 + legOff, 4, 3, '#f5d0a9');
  drawPixelRect(x + 11, armY + 14 + legOff2, 4, 3, '#f5d0a9');

  // Skirt (navy pleated)
  drawPixelRect(x - 13, y + bob + 38, 26, 10, '#2d3a6e');
  drawPixelRect(x - 14, y + bob + 42, 28, 6, '#2d3a6e');
  // Pleat lines
  for (let i = -10; i <= 10; i += 5) {
    drawPixelRect(x + i, y + bob + 39, 1, 9, '#222a55');
  }

  // Legs
  drawPixelRect(x - 8, y + bob + 48 + legOff, 5, 12, '#f5d0a9');
  drawPixelRect(x + 3, y + bob + 48 + legOff2, 5, 12, '#f5d0a9');
  // Socks (white)
  drawPixelRect(x - 8, y + bob + 55 + legOff, 5, 5, '#fff');
  drawPixelRect(x + 3, y + bob + 55 + legOff2, 5, 5, '#fff');
  // Shoes (brown)
  drawPixelRect(x - 9, y + bob + 60 + legOff, 7, 4, '#5c3a1e');
  drawPixelRect(x + 2, y + bob + 60 + legOff2, 7, 4, '#5c3a1e');
}

// --- Resize ---
function resize() {
  const aspect = 1024 / GAME_H;
  let w = window.innerWidth;
  let h = window.innerHeight;
  if (w / h > aspect) { w = h * aspect; } else { h = w / aspect; }
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  gameW = 1024;
  canvas.width = gameW;
  canvas.height = GAME_H;
}
window.addEventListener('resize', resize);
resize();

// --- Input ---
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (gameState === 'start') { initAudio(); gameState = 'fadein'; setupCorridor(1); fadeAlpha = 1; fadeDir = -1; }
  if (gameState === 'gameover' || gameState === 'win') { initAudio(); currentCorridor = 1; gameState = 'fadein'; setupCorridor(1); fadeAlpha = 1; fadeDir = -1; }
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  if (gameState === 'start' || gameState === 'gameover' || gameState === 'win') {
    if (gameState !== 'start') currentCorridor = 1;
    gameState = 'fadein'; setupCorridor(currentCorridor); fadeAlpha = 1; fadeDir = -1;
    return;
  }
  const rect = canvas.getBoundingClientRect();
  const tx = (e.touches[0].clientX - rect.left) / rect.width;
  touchSide = tx < 0.5 ? -1 : 1;
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const tx = (e.touches[0].clientX - rect.left) / rect.width;
  touchSide = tx < 0.5 ? -1 : 1;
});
canvas.addEventListener('touchend', e => { e.preventDefault(); touchSide = 0; });
canvas.addEventListener('touchcancel', e => { touchSide = 0; });

// --- Game Loop ---
function update() {
  if (gameState === 'playing') {
    let dx = 0;
    if (keys['a'] || keys['arrowleft'] || touchSide === -1) dx -= PLAYER_SPEED;
    if (keys['d'] || keys['arrowright'] || touchSide === 1) dx += PLAYER_SPEED;

    isMoving = dx !== 0;
    if (dx < 0) playerFacing = -1;
    if (dx > 0) playerFacing = 1;

    if (isMoving) {
      frameTimer++;
      if (frameTimer >= 8) { frameTimer = 0; playerFrame = (playerFrame + 1) % 3; }
      playFootstep();
    } else {
      frameTimer = 0; playerFrame = 0;
    }

    playerX += dx;

    // Check boundaries - exit corridor
    if (playerX < -20) {
      // Exited LEFT = turn back
      if (isAnomaly) {
        // Correct!
        playSfx(true);
        currentCorridor++;
        if (currentCorridor > TOTAL_CORRIDORS) {
          startFade(() => { gameState = 'win'; });
        } else {
          startFade(() => { setupCorridor(currentCorridor); gameState = 'fadein'; fadeAlpha = 1; fadeDir = -1; });
        }
        gameState = 'fade';
      } else {
        // Wrong
        playSfx(false);
        startFade(() => { currentCorridor = 1; setupCorridor(1); gameState = 'gameover'; });
        gameState = 'fade';
      }
    } else if (playerX > mapW + 20) {
      // Exited RIGHT = continue forward
      if (!isAnomaly) {
        playSfx(true);
        currentCorridor++;
        if (currentCorridor > TOTAL_CORRIDORS) {
          startFade(() => { gameState = 'win'; });
        } else {
          startFade(() => { setupCorridor(currentCorridor); gameState = 'fadein'; fadeAlpha = 1; fadeDir = -1; });
        }
        gameState = 'fade';
      } else {
        playSfx(false);
        startFade(() => { currentCorridor = 1; setupCorridor(1); gameState = 'gameover'; });
        gameState = 'fade';
      }
    }
  }

  // Fade transitions
  if (gameState === 'fade') {
    fadeAlpha += 0.04;
    if (fadeAlpha >= 1) { fadeAlpha = 1; if (nextAction) nextAction(); nextAction = null; }
  }
  if (gameState === 'fadein') {
    fadeAlpha -= 0.04;
    if (fadeAlpha <= 0) { fadeAlpha = 0; gameState = 'playing'; }
  }
}

function draw() {
  ctx.imageSmoothingEnabled = false;

  if (gameState === 'loading') {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, gameW, GAME_H);
    ctx.fillStyle = '#888';
    ctx.font = '16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('加载中... ' + loadedCount + '/' + imgNames.length, gameW / 2, GAME_H / 2);
    return;
  }

  if (gameState === 'start') {
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, gameW, GAME_H);
    ctx.fillStyle = '#c8c8d0';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('《回家路》', gameW / 2, GAME_H / 2 - 50);
    ctx.font = '18px monospace';
    ctx.fillStyle = '#888';
    ctx.fillText('按任意键开始', gameW / 2, GAME_H / 2 + 10);
    ctx.font = '14px monospace';
    ctx.fillStyle = '#666';
    ctx.fillText('发现异常按A回头，正常按D前进', gameW / 2, GAME_H / 2 + 45);
    ctx.fillText('A/D 或 触摸屏幕左右移动', gameW / 2, GAME_H / 2 + 68);
    return;
  }

  if (gameState === 'gameover') {
    ctx.fillStyle = '#1a0000';
    ctx.fillRect(0, 0, gameW, GAME_H);
    ctx.fillStyle = '#cc4444';
    ctx.font = 'bold 32px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('你没有发现异常！回到起点...', gameW / 2, GAME_H / 2 - 20);
    ctx.font = '18px monospace';
    ctx.fillStyle = '#888';
    ctx.fillText('按任意键重新开始', gameW / 2, GAME_H / 2 + 30);
    return;
  }

  if (gameState === 'win') {
    ctx.fillStyle = '#0a1a0a';
    ctx.fillRect(0, 0, gameW, GAME_H);
    ctx.fillStyle = '#88cc88';
    ctx.font = 'bold 40px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('你安全到家了！🏠', gameW / 2, GAME_H / 2 - 20);
    ctx.font = '18px monospace';
    ctx.fillStyle = '#888';
    ctx.fillText('按任意键再玩一次', gameW / 2, GAME_H / 2 + 30);
    return;
  }

  // Playing / fade / fadein
  if (currentMapImg) {
    // Camera: center on player
    const camX = Math.max(0, Math.min(playerX - gameW / 2, mapW - gameW));
    // Draw map
    ctx.drawImage(currentMapImg, -camX, 0, mapW, GAME_H);

    // Draw player at screen position
    const screenX = playerX - camX;
    const playerGroundY = GAME_H - 90; // feet position
    // Flip if facing left
    ctx.save();
    if (playerFacing === -1) {
      ctx.translate(screenX, 0);
      ctx.scale(-1, 1);
      drawPlayer(0, playerGroundY - 64, 1, playerFrame);
    } else {
      drawPlayer(screenX, playerGroundY - 64, 1, playerFrame);
    }
    ctx.restore();

    // UI: corridor counter
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(8, 8, 120, 28);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('走廊 ' + currentCorridor + '/10', 16, 28);

    // Bottom hint bar
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, GAME_H - 28, gameW, 28);
    ctx.fillStyle = '#aaa';
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('A ← 回头  |  D → 前进', gameW / 2, GAME_H - 9);
  }

  // Fade overlay
  if (fadeAlpha > 0) {
    ctx.fillStyle = 'rgba(0,0,0,' + fadeAlpha + ')';
    ctx.fillRect(0, 0, gameW, GAME_H);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

preload();
loop();
</script>
</body>
</html>
