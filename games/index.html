<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>放学回家 - 走廊逃脱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Courier New', monospace;
        }
        #game-container {
            position: relative;
            border: 4px solid #4a4a6a;
            border-radius: 8px;
            overflow: hidden;
        }
        #game-canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
            text-shadow: 2px 2px 0 #000;
        }
        #message {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 18px;
            text-shadow: 2px 2px 0 #000;
            text-align: center;
            max-width: 90%;
        }
        #start-screen, #game-over-screen, #win-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        #start-screen h1, #game-over-screen h1, #win-screen h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #ffd700;
        }
        #start-screen p, #game-over-screen p, #win-screen p {
            font-size: 16px;
            margin-bottom: 10px;
            text-align: center;
            max-width: 80%;
            line-height: 1.6;
        }
        button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            background: #4a4a6a;
            color: #fff;
            border: 3px solid #8a8aaa;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #6a6a8a;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="800" height="600"></canvas>
        <div id="ui-overlay">
            <div>走廊：<span id="corridor-num">1</span>/10</div>
            <div>尝试：<span id="attempt-num">1</span></div>
        </div>
        <div id="message"></div>
        
        <div id="start-screen">
            <h1>🏫 放学回家</h1>
            <p>你是一个学生，要走过 10 条走廊回家</p>
            <p>⚠️ 注意：有些走廊会出现异常</p>
            <p>👀 发现异常时要<b>回头离开</b>才能继续</p>
            <p>❌ 如果无视异常继续前进，会回到起点重新开始</p>
            <p>🎮 方向键或 WASD 移动</p>
            <button onclick="game.start()">开始游戏</button>
        </div>
        
        <div id="game-over-screen" class="hidden">
            <h1>😢 游戏结束</h1>
            <p>你无视了异常，被送回了起点</p>
            <p>下次记得：发现异常要<b>回头离开</b>！</p>
            <p>到达走廊：<span id="final-corridor">0</span></p>
            <button onclick="game.restart()">再来一次</button>
        </div>
        
        <div id="win-screen" class="hidden">
            <h1>🎉 恭喜你！</h1>
            <p>你成功走过了所有走廊，安全回家了！</p>
            <p>总尝试次数：<span id="win-attempts">1</span></p>
            <button onclick="game.restart()">再玩一次</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
